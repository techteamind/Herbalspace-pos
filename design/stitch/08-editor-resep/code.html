<!DOCTYPE html>
<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Editor Resep - Herbaspace</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = { darkMode: "class", theme: { extend: {
"colors": {
"on-primary-fixed":"#002112","secondary-container":"#fdb244","surface-container-low":"#f1f5ef","primary-fixed-dim":"#82d8aa","surface-tint":"#056c47","surface":"#f6faf5","surface-container-lowest":"#ffffff","secondary":"#835400","secondary-fixed-dim":"#ffb956","on-secondary-fixed-variant":"#633f00","surface-container-highest":"#dfe4de","surface-container":"#ebefe9","on-tertiary-fixed-variant":"#782e33","on-primary-fixed-variant":"#005234","primary-fixed":"#9ef5c4","on-secondary-container":"#6e4600","surface-container-high":"#e5e9e4","on-secondary":"#ffffff","tertiary-container":"#a65256","on-background":"#181d19","inverse-on-surface":"#eef2ec","on-primary":"#ffffff","secondary-fixed":"#ffddb5","outline-variant":"#bec9c0","on-tertiary-container":"#ffe9e8","tertiary-fixed":"#ffdad9","surface-bright":"#f6faf5","inverse-surface":"#2d322e","error-container":"#ffdad6","primary-container":"#1f7a53","on-surface":"#181d19","tertiary":"#883b3f","primary":"#00603e","surface-dim":"#d7dbd6","surface-variant":"#dfe4de","tertiary-fixed-dim":"#ffb3b4","on-primary-container":"#aeffd1","error":"#ba1a1a","background":"#f6faf5","inverse-primary":"#82d8aa","on-secondary-fixed":"#2a1800","on-tertiary":"#ffffff","on-surface-variant":"#3f4942","on-error":"#ffffff","outline":"#6f7a72","on-tertiary-fixed":"#3e030c","on-error-container":"#93000a"
},
"borderRadius": { "DEFAULT":"0.25rem","lg":"0.5rem","xl":"0.75rem","full":"9999px" },
"spacing": { "base-unit":"4px","touch-target-min":"44px","container-padding":"16px","gutter":"12px","section-gap":"24px" },
"fontFamily": { "h2":["Inter"],"display-price":["Inter"],"h1":["Inter"],"label-caps":["Inter"],"body-lg":["Inter"],"body-md":["Inter"],"display-price-mobile":["Inter"] },
"fontSize": {
"h2":["20px",{"lineHeight":"28px","fontWeight":"600"}],
"display-price":["32px",{"lineHeight":"40px","letterSpacing":"-0.02em","fontWeight":"700"}],
"h1":["24px",{"lineHeight":"32px","fontWeight":"600"}],
"label-caps":["12px",{"lineHeight":"16px","letterSpacing":"0.05em","fontWeight":"600"}],
"body-lg":["16px",{"lineHeight":"24px","fontWeight":"400"}],
"body-md":["14px",{"lineHeight":"20px","fontWeight":"400"}],
"display-price-mobile":["28px",{"lineHeight":"34px","fontWeight":"700"}]
}
}}}
</script>
<style>
body { -webkit-tap-highlight-color: transparent; }
.material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
.icon-filled { font-variation-settings: 'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24; }
.hide-scrollbar::-webkit-scrollbar { display:none; }
.hide-scrollbar { -ms-overflow-style:none; scrollbar-width:none; }
.pb-safe { padding-bottom: env(safe-area-inset-bottom,16px); }
</style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col antialiased">

<header class="bg-surface docked full-width top-0 sticky z-40">
<div class="flex justify-between items-center w-full px-container-padding h-20 py-4">
<button aria-label="Menu" class="text-primary hover:bg-surface-container-low active:opacity-80 transition-opacity p-2 -ml-2 rounded-full"><span class="material-symbols-outlined">arrow_back</span></button>
<div class="flex-1 flex justify-center items-center"><h1 class="font-h1 text-h1 font-bold text-primary truncate">Resep Produk</h1></div>
<button aria-label="Action" class="text-primary hover:bg-surface-container-low active:opacity-80 transition-opacity p-2 -mr-2 rounded-full"><span class="material-symbols-outlined">save</span></button>
</div></header>
<main class="flex-1 flex flex-col pb-40">
<div class="px-container-padding py-3 bg-surface-container-low">
<p class="font-label-caps text-on-surface-variant uppercase">Resep untuk</p>
<h2 class="font-h2 text-h2 text-on-surface">Kopi Susu Gula Aren</h2>
</div>
<div class="px-container-padding py-3 space-y-2">
<div class="bg-surface-container-lowest p-3 rounded-xl shadow-sm flex items-center gap-3">
<div class="flex-1"><h3 class="font-body-md font-semibold text-on-surface">Biji Kopi Arabica</h3></div>
<div class="flex items-center gap-1 border border-outline-variant rounded-lg px-2 h-9 bg-surface"><input class="w-12 text-right bg-transparent focus:outline-none font-body-md font-semibold" value="18"/><span class="font-body-md text-on-surface-variant">gr</span></div>
<button class="text-error p-1"><span class="material-symbols-outlined">delete</span></button></div><div class="bg-surface-container-lowest p-3 rounded-xl shadow-sm flex items-center gap-3">
<div class="flex-1"><h3 class="font-body-md font-semibold text-on-surface">Susu Segar (Full Cream)</h3></div>
<div class="flex items-center gap-1 border border-outline-variant rounded-lg px-2 h-9 bg-surface"><input class="w-12 text-right bg-transparent focus:outline-none font-body-md font-semibold" value="120"/><span class="font-body-md text-on-surface-variant">ml</span></div>
<button class="text-error p-1"><span class="material-symbols-outlined">delete</span></button></div><div class="bg-surface-container-lowest p-3 rounded-xl shadow-sm flex items-center gap-3">
<div class="flex-1"><h3 class="font-body-md font-semibold text-on-surface">Gula Aren Cair</h3></div>
<div class="flex items-center gap-1 border border-outline-variant rounded-lg px-2 h-9 bg-surface"><input class="w-12 text-right bg-transparent focus:outline-none font-body-md font-semibold" value="30"/><span class="font-body-md text-on-surface-variant">ml</span></div>
<button class="text-error p-1"><span class="material-symbols-outlined">delete</span></button></div><div class="bg-surface-container-lowest p-3 rounded-xl shadow-sm flex items-center gap-3">
<div class="flex-1"><h3 class="font-body-md font-semibold text-on-surface">Es Batu</h3></div>
<div class="flex items-center gap-1 border border-outline-variant rounded-lg px-2 h-9 bg-surface"><input class="w-12 text-right bg-transparent focus:outline-none font-body-md font-semibold" value="80"/><span class="font-body-md text-on-surface-variant">gr</span></div>
<button class="text-error p-1"><span class="material-symbols-outlined">delete</span></button></div>
<button class="w-full h-12 rounded-xl border-2 border-dashed border-primary/40 text-primary font-body-md font-semibold flex items-center justify-center gap-2 active:scale-[0.98] transition-transform"><span class="material-symbols-outlined">add</span>Tambah Bahan</button>
</div>
</main>
<!-- HPP summary + save -->
<div class="fixed bottom-0 left-0 w-full pb-safe bg-background">
<div class="mx-container-padding mb-2 bg-surface-container-lowest rounded-xl p-4 shadow-sm border border-outline-variant/40 flex justify-between items-center">
<div><p class="font-label-caps text-on-surface-variant uppercase">HPP per porsi</p><p class="font-h2 text-primary">Rp 8.500</p></div>
<div class="text-right"><p class="font-label-caps text-on-surface-variant uppercase">Margin</p><p class="font-h2 text-on-surface">66%</p></div>
</div>
<div class="px-container-padding pt-1"><button class="w-full bg-primary text-on-primary rounded-xl h-14 font-body-lg font-semibold active:scale-[0.98] transition-transform shadow-sm">Simpan Resep</button></div>
</div>

</body></html>
