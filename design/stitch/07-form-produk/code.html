<!DOCTYPE html>
<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Form Produk - Herbaspace</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = { darkMode: "class", theme: { extend: {
"colors": {
"on-primary-fixed":"#002112","secondary-container":"#fdb244","surface-container-low":"#f1f5ef","primary-fixed-dim":"#82d8aa","surface-tint":"#056c47","surface":"#f6faf5","surface-container-lowest":"#ffffff","secondary":"#835400","secondary-fixed-dim":"#ffb956","on-secondary-fixed-variant":"#633f00","surface-container-highest":"#dfe4de","surface-container":"#ebefe9","on-tertiary-fixed-variant":"#782e33","on-primary-fixed-variant":"#005234","primary-fixed":"#9ef5c4","on-secondary-container":"#6e4600","surface-container-high":"#e5e9e4","on-secondary":"#ffffff","tertiary-container":"#a65256","on-background":"#181d19","inverse-on-surface":"#eef2ec","on-primary":"#ffffff","secondary-fixed":"#ffddb5","outline-variant":"#bec9c0","on-tertiary-container":"#ffe9e8","tertiary-fixed":"#ffdad9","surface-bright":"#f6faf5","inverse-surface":"#2d322e","error-container":"#ffdad6","primary-container":"#1f7a53","on-surface":"#181d19","tertiary":"#883b3f","primary":"#00603e","surface-dim":"#d7dbd6","surface-variant":"#dfe4de","tertiary-fixed-dim":"#ffb3b4","on-primary-container":"#aeffd1","error":"#ba1a1a","background":"#f6faf5","inverse-primary":"#82d8aa","on-secondary-fixed":"#2a1800","on-tertiary":"#ffffff","on-surface-variant":"#3f4942","on-error":"#ffffff","outline":"#6f7a72","on-tertiary-fixed":"#3e030c","on-error-container":"#93000a"
},
"borderRadius": { "DEFAULT":"0.25rem","lg":"0.5rem","xl":"0.75rem","full":"9999px" },
"spacing": { "base-unit":"4px","touch-target-min":"44px","container-padding":"16px","gutter":"12px","section-gap":"24px" },
"fontFamily": { "h2":["Inter"],"display-price":["Inter"],"h1":["Inter"],"label-caps":["Inter"],"body-lg":["Inter"],"body-md":["Inter"],"display-price-mobile":["Inter"] },
"fontSize": {
"h2":["20px",{"lineHeight":"28px","fontWeight":"600"}],
"display-price":["32px",{"lineHeight":"40px","letterSpacing":"-0.02em","fontWeight":"700"}],
"h1":["24px",{"lineHeight":"32px","fontWeight":"600"}],
"label-caps":["12px",{"lineHeight":"16px","letterSpacing":"0.05em","fontWeight":"600"}],
"body-lg":["16px",{"lineHeight":"24px","fontWeight":"400"}],
"body-md":["14px",{"lineHeight":"20px","fontWeight":"400"}],
"display-price-mobile":["28px",{"lineHeight":"34px","fontWeight":"700"}]
}
}}}
</script>
<style>
body { -webkit-tap-highlight-color: transparent; }
.material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
.icon-filled { font-variation-settings: 'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24; }
.hide-scrollbar::-webkit-scrollbar { display:none; }
.hide-scrollbar { -ms-overflow-style:none; scrollbar-width:none; }
.pb-safe { padding-bottom: env(safe-area-inset-bottom,16px); }
</style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col antialiased">

<header class="bg-surface docked full-width top-0 sticky z-40">
<div class="flex justify-between items-center w-full px-container-padding h-20 py-4">
<button aria-label="Menu" class="text-primary hover:bg-surface-container-low active:opacity-80 transition-opacity p-2 -ml-2 rounded-full"><span class="material-symbols-outlined">arrow_back</span></button>
<div class="flex-1 flex justify-center items-center"><h1 class="font-h1 text-h1 font-bold text-primary truncate">Tambah Produk</h1></div>
<button aria-label="Action" class="text-primary hover:bg-surface-container-low active:opacity-80 transition-opacity p-2 -mr-2 rounded-full"><span class="material-symbols-outlined">delete</span></button>
</div></header>
<main class="flex-1 flex flex-col pb-28 px-container-padding py-2 space-y-5">
<div class="flex flex-col items-center gap-2 py-2">
<div class="w-28 h-28 rounded-xl bg-surface-container border-2 border-dashed border-outline-variant flex flex-col items-center justify-center text-on-surface-variant"><span class="material-symbols-outlined text-[32px]">add_a_photo</span><span class="font-label-caps mt-1">Foto</span></div>
</div>
<div class="space-y-1"><label class="font-label-caps text-on-surface-variant uppercase">Nama Produk</label>
<input class="w-full h-touch-target-min px-4 rounded-lg border border-outline-variant bg-surface-container-lowest focus:outline-none focus:border-primary font-body-md" value="Kopi Susu Gula Aren"/></div>
<div class="grid grid-cols-2 gap-3">
<div class="space-y-1"><label class="font-label-caps text-on-surface-variant uppercase">Kategori</label>
<div class="w-full h-touch-target-min px-4 rounded-lg border border-outline-variant bg-surface-container-lowest flex items-center justify-between font-body-md"><span>Kopi</span><span class="material-symbols-outlined text-on-surface-variant">expand_more</span></div></div>
<div class="space-y-1"><label class="font-label-caps text-on-surface-variant uppercase">Harga Jual</label>
<div class="w-full h-touch-target-min px-4 rounded-lg border border-outline-variant bg-surface-container-lowest flex items-center font-body-md"><span class="text-on-surface-variant mr-1">Rp</span><span>25.000</span></div></div>
</div>
<div class="space-y-1"><label class="font-label-caps text-on-surface-variant uppercase">SKU (Opsional)</label>
<input class="w-full h-touch-target-min px-4 rounded-lg border border-outline-variant bg-surface-container-lowest focus:outline-none focus:border-primary font-body-md" placeholder="KSG-001"/></div>
<div class="flex items-center justify-between bg-surface-container-lowest border border-outline-variant rounded-lg px-4 h-touch-target-min">
<span class="font-body-md text-on-surface">Status Aktif</span>
<div class="w-11 h-6 bg-primary-container rounded-full relative"><div class="absolute right-0.5 top-0.5 w-5 h-5 bg-white rounded-full shadow"></div></div>
</div>
<button class="flex items-center justify-between bg-primary-container/10 border border-primary-container rounded-xl px-4 h-touch-target-min text-primary">
<div class="flex items-center gap-2"><span class="material-symbols-outlined">science</span><span class="font-body-md font-semibold">Atur Resep Bahan Baku</span></div>
<span class="material-symbols-outlined">chevron_right</span>
</button>
</main>
<div class="fixed bottom-0 left-0 w-full px-container-padding pb-safe pt-2 bg-background">
<button class="w-full bg-primary text-on-primary rounded-xl h-14 font-body-lg font-semibold active:scale-[0.98] transition-transform shadow-sm">Simpan Produk</button>
</div>

</body></html>
