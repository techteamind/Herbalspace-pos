<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Herbaspace POS - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-primary-fixed": "#002112",
                      "secondary-container": "#fdb244",
                      "surface-container-low": "#f1f5ef",
                      "primary-fixed-dim": "#82d8aa",
                      "surface-tint": "#056c47",
                      "surface": "#f6faf5",
                      "surface-container-lowest": "#ffffff",
                      "secondary": "#835400",
                      "secondary-fixed-dim": "#ffb956",
                      "on-secondary-fixed-variant": "#633f00",
                      "surface-container-highest": "#dfe4de",
                      "surface-container": "#ebefe9",
                      "on-tertiary-fixed-variant": "#782e33",
                      "on-primary-fixed-variant": "#005234",
                      "primary-fixed": "#9ef5c4",
                      "on-secondary-container": "#6e4600",
                      "surface-container-high": "#e5e9e4",
                      "on-secondary": "#ffffff",
                      "tertiary-container": "#a65256",
                      "on-background": "#181d19",
                      "inverse-on-surface": "#eef2ec",
                      "on-primary": "#ffffff",
                      "secondary-fixed": "#ffddb5",
                      "outline-variant": "#bec9c0",
                      "on-tertiary-container": "#ffe9e8",
                      "tertiary-fixed": "#ffdad9",
                      "surface-bright": "#f6faf5",
                      "inverse-surface": "#2d322e",
                      "error-container": "#ffdad6",
                      "primary-container": "#1f7a53",
                      "on-surface": "#181d19",
                      "tertiary": "#883b3f",
                      "primary": "#00603e",
                      "surface-dim": "#d7dbd6",
                      "surface-variant": "#dfe4de",
                      "tertiary-fixed-dim": "#ffb3b4",
                      "on-primary-container": "#aeffd1",
                      "error": "#ba1a1a",
                      "background": "#f6faf5",
                      "inverse-primary": "#82d8aa",
                      "on-secondary-fixed": "#2a1800",
                      "on-tertiary": "#ffffff",
                      "on-surface-variant": "#3f4942",
                      "on-error": "#ffffff",
                      "outline": "#6f7a72",
                      "on-tertiary-fixed": "#3e030c",
                      "on-error-container": "#93000a"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "base-unit": "4px",
                      "touch-target-min": "44px",
                      "container-padding": "16px",
                      "gutter": "12px",
                      "section-gap": "24px"
              },
              "fontFamily": {
                      "h2": ["Inter"],
                      "display-price": ["Inter"],
                      "h1": ["Inter"],
                      "label-caps": ["Inter"],
                      "body-lg": ["Inter"],
                      "body-md": ["Inter"],
                      "display-price-mobile": ["Inter"]
              },
              "fontSize": {
                      "h2": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                      "display-price": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                      "h1": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                      "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                      "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                      "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                      "display-price-mobile": ["28px", { "lineHeight": "34px", "fontWeight": "700" }]
              }
            }
          }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center relative overflow-hidden font-body-md antialiased md:hidden">
<!-- Ambient Background Gradient -->
<div class="absolute inset-0 z-0 pointer-events-none bg-gradient-to-br from-primary-fixed/20 via-background to-background"></div>
<div class="absolute -top-32 -left-32 w-96 h-96 bg-primary-container/20 rounded-full blur-3xl z-0"></div>
<div class="absolute top-1/4 -right-24 w-72 h-72 bg-secondary-fixed/10 rounded-full blur-2xl z-0"></div>
<!-- Login Container -->
<main class="w-full max-w-md px-container-padding z-10 flex flex-col h-full justify-center pb-section-gap pt-12">
<!-- Brand Header -->
<header class="flex flex-col items-center mb-section-gap">
<div class="w-16 h-16 bg-surface-container-highest rounded-2xl flex items-center justify-center mb-6 shadow-sm border border-outline-variant/30">
<span class="material-symbols-outlined text-4xl text-primary" data-icon="eco" data-weight="fill" style="font-variation-settings: 'FILL' 1;">eco</span>
</div>
<h1 class="font-h1 text-h1 text-primary text-center mb-2">Herbaspace POS</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center">Sistem Kasir Pintar &amp; Efisien</p>
</header>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_4px_12px_rgba(15,23,42,0.05)] border border-outline-variant/20 p-6 mb-8">
<h2 class="font-h2 text-h2 text-on-surface mb-6">Masuk Akun</h2>
<form action="#" class="space-y-4 flex flex-col">
<!-- Email Field -->
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-1.5" for="email">EMAIL</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:ring-2 focus:ring-primary focus:border-primary transition-colors h-touch-target-min" id="email" name="email" placeholder="nama@kafe.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<div class="flex justify-between items-center mb-1.5">
<label class="block font-label-caps text-label-caps text-on-surface-variant" for="password">KATA SANDI</label>
<a class="font-body-md text-body-md text-primary hover:underline text-sm" href="#">Lupa sandi?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:ring-2 focus:ring-primary focus:border-primary transition-colors h-touch-target-min" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors focus:outline-none flex items-center justify-center h-full px-2" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="visibility-icon">visibility_off</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-touch-target-min mt-6 bg-primary text-on-primary rounded-lg font-body-lg text-body-lg font-medium hover:bg-surface-tint active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-sm" type="submit">
<span>Masuk</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
</div>
<!-- Help Link -->
<div class="text-center mt-auto">
<p class="font-body-md text-body-md text-on-surface-variant">
                Butuh bantuan? <a class="text-primary font-medium hover:underline" href="#">Hubungi Dukungan</a>
</p>
</div>
</main>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const visibilityIcon = document.getElementById('visibility-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                visibilityIcon.textContent = 'visibility';
            } else {
                passwordInput.type = 'password';
                visibilityIcon.textContent = 'visibility_off';
            }
        }
    </script>
</body></html>
